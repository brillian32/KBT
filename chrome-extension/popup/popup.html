<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Knowledge Base Tools</title>
</head>
<body>
  <div class="popup">
    <!-- 连接状态 -->
    <div class="popup__header">
      <h1 class="popup__title">KBT</h1>
      <div class="popup__header-right">
        <div id="status" class="popup__status popup__status--checking">
          <span class="popup__status-dot"></span>
          <span id="statusText">检测中...</span>
        </div>
        <button id="btnSettings" class="popup__icon-btn" title="Token 设置">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="popup__actions">
      <button id="btnFullPage" class="popup__btn" disabled>
        <span class="popup__btn-icon">📄</span>
        保存整页
      </button>
      <button id="btnSelection" class="popup__btn" disabled>
        <span class="popup__btn-icon">✂️</span>
        保存选中
      </button>
      <button id="btnInspect" class="popup__btn" disabled>
        <span class="popup__btn-icon">🔍</span>
        元素检查
      </button>
    </div>

    <!-- 标题编辑 -->
    <div class="popup__field">
      <input id="noteTitle" type="text" placeholder="标题（自动提取）" />
    </div>

    <!-- 标签编辑 -->
    <div class="popup__field">
      <div id="tagContainer" class="popup__tags">
        <input id="tagInput" type="text" placeholder="添加标签..." />
      </div>
    </div>

    <!-- Token 配置抽屉（齿轮按钮触发） -->
    <div id="tokenSection" class="popup__token-section" style="display:none;">
      <div class="popup__token-status" id="tokenStatus"></div>
      <div class="popup__token-row">
        <input id="tokenInput" type="password" placeholder="粘贴 Token..." />
        <button id="btnSaveToken" class="popup__save-btn">绑定</button>
      </div>
      <p class="popup__hint">在桌面端 设置 → HTTP 服务 → Token 复制后粘贴</p>
    </div>

    <!-- 消息提示 -->
    <div id="message" class="popup__message" style="display:none;"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
